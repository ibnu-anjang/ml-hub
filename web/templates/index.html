{% extends "_base.html" %}
{% block title %}ML Hub — Home{% endblock %}
{% block content %}
<section class="hero">
  <h1>Machine Learning Hub</h1>
  <p class="subtitle">Demo project ML — pilih satu untuk mencoba</p>
</section>

<div class="card-grid">
  {% for p in projects %}
  <a class="card" href="{{ p.url }}" style="--accent: {{ p.color }}">
    <div class="card-icon">{{ p.icon }}</div>
    <h2>{{ p.name }}</h2>
    <p>{{ p.desc }}</p>
    <span class="card-cta">Coba sekarang →</span>
  </a>
  {% endfor %}
</div>
{% endblock %}
